name: Go Module Consistency

on:
  push:
    branches: [ master, 'release-**' ]
  pull_request:
    branches: [ master, 'release-**' ]

permissions:
  contents: read

jobs:
  go-mod-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.2.2

      - name: Discover Go modules
        id: gomods
        uses: ./.github/actions/discover-go-modules

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ steps.gomods.outputs.version }}
          check-latest: true
          cache-dependency-path: ${{ steps.gomods.outputs.gosums }}

      - name: Run go mod tidy and verify
        run: |
          set -euo pipefail
          mapfile -t modules <<< "${{ steps.gomods.outputs.modules }}"
          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No modules found from discovery step" >&2
            exit 1
          fi
          for m in "${modules[@]}"; do
            if [ -z "${m}" ]; then
              continue
            fi
            echo ">> go mod tidy (${m})"
            (cd "${m}" && go mod tidy)
            echo ">> go mod verify (${m})"
            (cd "${m}" && go mod verify)
          done

      - name: Fail on uncommitted changes
        run: |
          git diff --stat
          git diff --quiet
