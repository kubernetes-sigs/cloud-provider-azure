name: Go Module Consistency

on:
  push:
    branches: [ master, 'release-**' ]
  pull_request:
    branches: [ master, 'release-**' ]

permissions:
  contents: read

jobs:
  go-mod-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Discover Go modules
        id: gomods
        uses: ./.github/actions/discover-go-modules

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ steps.gomods.outputs.version }}
          check-latest: true
          cache-dependency-path: ${{ steps.gomods.outputs.gosums }}

      - name: Run go mod tidy and verify
        run: |
          set -euo pipefail
          mapfile -t modules <<< "${{ steps.gomods.outputs.modules }}"
          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No modules found from discovery step" >&2
            exit 1
          fi
          for m in "${modules[@]}"; do
            if [ -z "${m}" ]; then
              continue
            fi
            echo ">> go mod tidy (${m})"
            (cd "${m}" && go mod tidy)
            echo ">> go mod verify (${m})"
            (cd "${m}" && go mod verify)
          done

      - name: Fail on uncommitted changes
        run: |
          git diff --stat
          git diff --quiet
